# Terragrunt Boilerplate Configuration
variables:
  # Generic Boilerplate Variables Setup
  - name: is_hub
    order: 0
    description: "Is this a hub configuration?"
    type: bool
    default: false
  - name: tags
    order: 1
    description: "Tags"
    type: map
    default: {}
  # End - Generic Boilerplate Variables Setup
  - name: project
    order: 2
    description: "Project Dependency is enabled?"
    type: bool
    default: true
  - name: project_path
    order: 3
    description: "Project Path, required if project is true"
    type: string
    default: "../project"
  - name: vpc
    order: 4
    description: "VPC Dependency is enabled?"
    type: bool
    default: true
  - name: vpc_path
    order: 5
    description: "VPC Path, required if vpc is true"
    type: string
    default: "../vpc"
  - name: vpc_subnet_selection
    order: 6
    description: "VPC Database Subnet dependecy assignment"
    type: enum
    default: database
    options:
      - database
      - private
      - intra

hooks:
  after:
    - command: "git"
      args: ["add", "."]
      dir: "{{ outputFolder }}"